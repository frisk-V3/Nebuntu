name: Build-Nebuntu-ISO

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y live-build xorriso debootstrap squashfs-tools curl gpg

      - name: Configure Nebuntu
        run: |
          mkdir -p lb/config/package-lists
          mkdir -p lb/config/archives
          mkdir -p lb/config/includes.chroot/etc/apt/preferences.d/
          cd lb
          curl -fSsL https://packages.mozilla.org | gpg --dearmor | sudo tee config/archives/mozilla.key.chroot > /dev/null
          cp config/archives/mozilla.key.chroot config/archives/mozilla.key.binary
          echo "deb [signed-by=/usr/share/keyrings/mozilla.gpg] https://packages.mozilla.org mozilla main" | tee config/archives/mozilla.list.chroot > /dev/null

          # 💡 書き方を変えました：1行ずつ echo してゴミを入れない
          echo "Package: *" | tee config/includes.chroot/etc/apt/preferences.d/mozilla > /dev/null
          echo "Pin: origin packages.mozilla.org" | tee -a config/includes.chroot/etc/apt/preferences.d/mozilla > /dev/null
          echo "Pin-Priority: 1000" | tee -a config/includes.chroot/etc/apt/preferences.d/mozilla > /dev/null

          lb config \
            --distribution noble \
            --archive-areas "main restricted universe multiverse" \
            --mirror-bootstrap http://jp.archive.ubuntu.com \
            --mirror-binary http://jp.archive.ubuntu.com \
            --binary-images iso-hybrid \
            --architectures amd64 \
            --memtest none

      - name: Create Package List
        run: |
          # 💡 ここも確実に1行ずつ
          LIST="lb/config/package-lists/desktop.list.chroot"
          echo "network-manager" > $LIST
          echo "xserver-xorg-core" >> $LIST
          echo "xserver-xorg-video-all" >> $LIST
          echo "xserver-xorg-input-all" >> $LIST
          echo "xfce4" >> $LIST
          echo "xfce4-terminal" >> $LIST
          echo "firefox" >> $LIST
          echo "fonts-vlgothic" >> $LIST
          echo "sudo" >> $LIST

      - name: Final Build
        run: |
          cd lb
          sudo mkdir -p config/chroot_local-includes/usr/share/keyrings/
          sudo cp config/archives/mozilla.key.chroot config/chroot_local-includes/usr/share/keyrings/mozilla.gpg
          sudo lb build

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: Nebuntu-ISO
          path: lb/*.iso
