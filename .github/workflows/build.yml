name: Nebuntu Auto-Release

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            debootstrap ubuntu-archive-keyring squashfs-tools xorriso mtools \
            grub-pc-bin grub-efi-amd64-bin live-boot wget xz-utils

      - name: Prepare workspace and debootstrap
        run: |
          set -eux
          export DIST=noble
          mkdir -p build chroot iso
          sudo debootstrap --arch=amd64 --variant=minbase $DIST build/chroot http://archive.ubuntu.com/ubuntu/

      - name: Mount dev for chroot
        run: |
          sudo mount --bind /dev build/chroot/dev
          sudo mount -t proc /proc build/chroot/proc || true
          sudo mount -t sysfs /sys build/chroot/sys || true

      - name: Customize chroot
        run: |
          sudo chroot build/chroot /bin/bash -eux -c "
            apt-get update
            apt-get install -y --no-install-recommends ubuntu-desktop-minimal wget vim curl
            echo 'Nebuntu 1.0 (Custom)' > /etc/issue
            echo 'Welcome to Nebuntu - Next Ubuntu' > /etc/motd
            apt-get clean
          "

      - name: Unmount chroot
        run: |
          sudo umount -l build/chroot/dev || true
          sudo umount -l build/chroot/proc || true
          sudo umount -l build/chroot/sys || true

      # 以下は前回提示と同様に squashfs 作成、ISO 組立、リリース作成へ続きます
