name: Nebuntu Auto-Release

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: ディスク容量の最大化 (OSビルド用)
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 5120
          swap-size-mb: 1024
          remove-dotnet: 'true'
          remove-android: 'true'

      - name: ビルドツールのインストール
        run: sudo apt-get update && sudo apt-get install -y xorriso squashfs-tools wget mtools fdisk

      - name: Dockerfileを動的に生成 (OSの心臓部を追加)
        run: |
          cat <<EOF > Dockerfile
          FROM ubuntu:24.04
          ENV DEBIAN_FRONTEND=noninteractive
          # 1. OSとして起動するためのコアパッケージとデスクトップ環境を導入
          RUN apt-get update && apt-get install -y \
              systemd systemd-sysv casper linux-image-generic initramfs-tools \
              ubuntu-desktop-minimal \
              wget gpg curl git vim firefox \
              && rm -rf /var/lib/apt/lists/*
          
          # 2. VS Code リポジトリの追加とインストール
          RUN wget -qO- https://packages.microsoft.com | gpg --dearmor > /usr/share/keyrings/microsoft.gpg \
              && echo "deb [arch=amd64 signed-by=/usr/share/keyrings/microsoft.gpg] https://packages.microsoft.com stable main" > /etc/apt/sources.list.d/vscode.list \
              && apt-get update && apt-get install -y code \
              && rm -rf /var/lib/apt/lists/*
          
          # 3. Nebuntuの独自設定
          RUN echo 'Nebuntu 1.0 (Custom)' > /etc/issue \
              && echo 'Welcome to Nebuntu - Next Ubuntu' > /etc/motd
          EOF

      - name: ベースISOの取得 (正確なURLを指定)
        run: |
          # 24.04.1のデスクトップ版ISOを直接ダウンロード
          wget https://releases.ubuntu.com/24.04/ubuntu-24.04.1-desktop-amd64.iso -O base.iso

      - name: ベースISOの解凍と権限付与
        run: |
          mkdir -p build/source build/rootfs
          # xorrisoで中身を展開
          xorriso -osirrox on -indev base.iso -extract / build/source/
          # 編集できるように書き込み権限を付与
          chmod -R u+w build/source

      - name: カスタマイズ済みrootfsの構築と抽出
        run: |
          # Dockerイメージのビルド
          docker build -t nebuntu-rootfs .
          
          # コンテナを作成し、仮想ファイルシステムを除外して安全に抽出
          CONTAINER_ID=\$(docker create nebuntu-rootfs)
          docker export \$CONTAINER_ID | tar -x -C build/rootfs
          docker rm \$CONTAINER_ID

      - name: カーネルとinitrdの同期 (超重要)
        run: |
          # Docker内でインストールされた最新のカーネルをLive OSの起動領域にコピー
          sudo cp build/rootfs/boot/vmlinuz-* build/source/casper/vmlinuz
          sudo cp build/rootfs/boot/initrd.img-* build/source/casper/initrd

      - name: filesystem.squashfs 再構築
        run: |
          # 元のsquashfsを削除して、Nebuntuのシステムを圧縮
          sudo rm -f build/source/casper/*.squashfs
          sudo mksquashfs build/rootfs build/source/casper/filesystem.squashfs -comp xz -b 1M -noappend

      - name: ブート可能ISOの再生成 (ハイブリッドブート対応)
        run: |
          # 元のISOからブートセクタ(MBR)を流用して、完璧な起動ディスクを作る
          sudo xorriso -as mkisofs -r -V "NEBUNTU" -o nebuntu.iso \
            -J -l -b boot/grub/i386-pc/eltorito.img -c boot.catalog \
            -no-emul-boot -boot-load-size 4 -boot-info-table \
            -eltorito-alt-boot -e EFI/boot/bootx64.efi -no-emul-boot \
            -append_partition 2 0xef build/source/boot/grub/efi.img \
            -isohybrid-mbr base.iso \
            build/source/

      - name: 既存の 'latest' タグを削除して上書き
        run: |
          git tag -f latest
          git push -f origin latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: リリースを上書き更新
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Nebuntu Latest Build"
          body: "Pushされるたびに自動更新されるNebuntu ISOです。ビルド時刻: \$(date)"
          files: nebuntu.iso
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
