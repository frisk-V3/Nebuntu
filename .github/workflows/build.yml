name: Build Nubuntu and Create ISO

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Git操作のために履歴をすべて取得

      - name: リポジトリ名を小文字に変換
        run: |
          echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: GitHubコンテナレジストリにログイン
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Dockerイメージをビルドして保存
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LOWER }}/nubuntu:latest

      - name: ISOファイルを作成してリポジトリに保存
        run: |
          # 1. ISOファイル（中身は今はテキスト）を作成
          echo "Nubuntu 1.0 ISO Base" > nubuntu.iso
          
          # 2. Gitの設定
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 3. ファイルを追加してPush
          git add nubuntu.iso
          git commit -m "chore: Nubuntu ISOファイルを更新" || echo "変更はありません"
          git push origin main
