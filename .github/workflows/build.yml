      - name: Nebuntu 構成作成
        run: |
          mkdir -p live-build-dir/config/package-lists
          mkdir -p live-build-dir/config/archives
          cd live-build-dir

          # Firefox用の鍵（合言葉）をダウンロードして配置
          curl -fSsL https://packages.mozilla.org | sudo gpg --dearmor -o config/archives/mozilla.key.chroot
          cp config/archives/mozilla.key.chroot config/archives/mozilla.key.binary

          # リポジトリ登録（鍵を指定する形式に変更）
          echo "deb [signed-by=/etc/apt/trusted.gpg.d/mozilla.gpg] https://packages.mozilla.org mozilla main" | tee config/archives/mozilla.list.chroot > /dev/null
          # chroot内での鍵の配置場所を調整
          mkdir -p config/includes.chroot/etc/apt/trusted.gpg.d/
          cp config/archives/mozilla.key.chroot config/includes.chroot/etc/apt/trusted.gpg.d/mozilla.gpg

          sudo lb config \
            --distribution noble \
            --archive-areas "main restricted universe multiverse" \
            --mirror-bootstrap http://archive.ubuntu.com \
            --mirror-binary http://archive.ubuntu.com \
            --security false \
            --debian-installer false \
            --bootappend-live "boot=live components locales=ja_JP.UTF-8 keyboard-layouts=jp" \
            --binary-images iso-hybrid \
 --memtest none
