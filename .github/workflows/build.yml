name: Build Nubuntu and Create ISO

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: 環境準備（リポジトリ名小文字化と容量確保）
        id: prep
        run: |
          # 1. リポジトリ名を小文字にしてoutputにセット（エラー回避）
          echo "repo_lower=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT
          
          # 2. GitHub Actionsのディスク容量を空ける（OSビルドには必須）
          echo "Freeing up disk space..."
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"

      - name: GitHubコンテナレジストリにログイン
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: DockerイメージをビルドしてPush
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # 先ほど設定したoutputを確実に参照
          tags: ghcr.io/${{ steps.prep.outputs.repo_lower }}/nubuntu:latest

      - name: Nubuntu ISOビルド実行
        run: |
          # 必要なツールのインストール
          sudo apt-get update
          sudo apt-get install -y xorriso squashfs-tools wget mtools

          # --- ここに実際のビルドロジックを記述 ---
          # 例: 以前のスクリプトをここに流し込む
          # wget http://releases.ubuntu.com... (中略) ...
          
          # 今はテスト用にダミーファイルを作成
          echo "This is Nubuntu 1.0 ISO Content" > nubuntu.iso

      - name: GitHub Releaseを作成してISOを配布
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/heads/main')
        with:
          files: nubuntu.iso
          tag_name: v1.0.${{ github.run_number }}
          name: "Nubuntu Release v1.0.${{ github.run_number }}"
          body: "Nubuntuの最新ビルドです。Dockerイメージと併せて公開されました。"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
