name: Build Nebuntu ISO

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # 手動でも実行できるようにする

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: 必要ツールをインストール
        run: |
          sudo apt-get update
          sudo apt-get install -y live-build xorriso debootstrap squashfs-tools

      - name: Nebuntu 構成作成
        run: |
          mkdir -p live-build-dir
          cd live-build-dir
          
          # 基本設定（Ubuntu 24.04 Noble）
          sudo lb config \
            --distribution noble \
            --archive-areas "main restricted universe multiverse" \
            --debian-installer false \
            --bootappend-live "boot=live components locales=ja_JP.UTF-8 keyboard-layouts=jp" \
            --binary-images iso-hybrid \
            --memtest none

          # インストールするパッケージの指定（デスクトップ環境など）
          mkdir -p config/package-lists
          cat <<EOF | sudo tee config/package-lists/desktop.list.chroot
          network-manager
          xserver-xorg-core
          xserver-xorg-video-all
          xserver-xorg-input-all
          xfce4
          xfce4-terminal
          firefox
          fonts-vlgothic
          EOF

      - name: Nebuntu ISO をビルド
        run: |
          cd live-build-dir
          # GitHub Actions環境での権限エラー回避
          sudo lb build

      - name: ISOファイル名のリネーム（Nebuntu.iso）
        run: |
          mv live-build-dir/live-image-amd64.hybrid.iso Nebuntu.iso

      - name: 成果物をアップロード
        uses: actions/upload-artifact@v4
        with:
          name: Nebuntu-ISO-Package
          path: Nebuntu.iso
