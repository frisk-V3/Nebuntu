name: Build Nubuntu

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # これを入れておくとボタンで手動実行もできて便利！

jobs:
  build-nubuntu:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t nubuntu:latest .
          echo "Nubuntuのビルドが完了しました！"
