name: Build Nebuntu ISO

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: ディスク容量の最大化 (20GB以上確保)
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 5120
          swap-size-mb: 1024
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'

      - name: ビルドツールのインストール
        run: |
          sudo apt-get update
          sudo apt-get install -y xorriso squashfs-tools wget mtools

      - name: ベースISOの準備
        run: |
          mkdir -p build/source
          # Ubuntu 24.04 Desktop ISOのダウンロード
          wget https://releases.ubuntu.com -O base.iso
          # ISOからファイルを抽出
          xorriso -osirrox on -indev base.iso -extract / build/source/

      - name: カスタマイズ済みrootfsの構築 (Docker経由)
        run: |
          # Dockerイメージをビルド
          docker build -t nebuntu-rootfs .
          # コンテナから中身をファイルとして取り出す
          mkdir -p build/rootfs
          docker run --rm nebuntu-rootfs tar -c / | tar -x -C build/rootfs

      - name: filesystem.squashfs の再構築
        run: |
          sudo rm build/source/casper/filesystem.squashfs
          # 再圧縮 (xzで極限まで小さくする)
          sudo mksquashfs build/rootfs build/source/casper/filesystem.squashfs -comp xz -noappend

      - name: ブート可能なISOの作成
        run: |
          # Ubuntu 24.04のブート構造を維持してビルド
          # ※元ISOのブートローダー設定をそのまま利用
          sudo xorriso -as mkisofs \
            -r -V "NEBUNTU_1_0" \
            -o nebuntu.iso \
            -J -joliet-long -l \
            -b boot/grub/i386-pc/eltorito.img \
            -c boot.catalog \
            -no-emul-boot -boot-load-size 4 -boot-info-table \
            -eltorito-alt-boot \
            -e boot/grub/efi.img \
            -no-emul-boot \
            -isohybrid-gpt-basdat \
            build/source/

      - name: リリース作成
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "Nebuntu Release v1.0.${{ github.run_number }}"
          files: nebuntu.iso
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
