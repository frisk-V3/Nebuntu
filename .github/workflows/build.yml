name: Nebuntu Auto-Release

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # 手動実行ボタンも追加

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: ディスク容量の最大化 (OSビルド用)
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 5120
          swap-size-mb: 1024
          remove-dotnet: 'true'
          remove-android: 'true'

      - name: Dockerfileを動的に生成 (NotFound対策)
        run: |
          cat <<EOF > Dockerfile
          FROM ubuntu:24.04
          ENV DEBIAN_FRONTEND=noninteractive
          RUN apt-get update && apt-get install -y \
              wget gpg curl git vim firefox \
              && wget -qO- https://packages.microsoft.com | gpg --dearmor > /usr/share/keyrings/microsoft.gpg \
              && echo "deb [arch=amd64 signed-by=/usr/share/keyrings/microsoft.gpg] https://packages.microsoft.com stable main" > /etc/apt/sources.list.d/vscode.list \
              && apt-get update && apt-get install -y code \
              && echo 'Nebuntu 1.0' > /etc/issue \
              && rm -rf /var/lib/apt/lists/*
          EOF

      - name: ビルドツールのインストール
        run: sudo apt-get update && sudo apt-get install -y xorriso squashfs-tools wget mtools

      - name: ベースISOの取得と解凍
        run: |
          mkdir -p build/source build/rootfs
          wget https://releases.ubuntu.com -O base.iso
          xorriso -osirrox on -indev base.iso -extract / build/source/

      - name: カスタマイズ済みrootfsの構築
        run: |
          docker build -t nebuntu-rootfs .
          # コンテナの中身をrootfsに展開
          docker run --rm nebuntu-rootfs tar -c / | tar -x -C build/rootfs

      - name: filesystem.squashfs 再構築
        run: |
          sudo rm build/source/casper/filesystem.squashfs
          sudo mksquashfs build/rootfs build/source/casper/filesystem.squashfs -comp xz -noappend

      - name: ブート可能ISO生成
        run: |
          sudo xorriso -as mkisofs \
            -r -V "NEBUNTU" -o nebuntu.iso \
            -J -joliet-long -l -b boot/grub/i386-pc/eltorito.img \
            -c boot.catalog -no-emul-boot -boot-load-size 4 -boot-info-table \
            -eltorito-alt-boot -e boot/grub/efi.img -no-emul-boot \
            -isohybrid-gpt-basdat build/source/

      - name: 既存の 'latest' タグを削除して上書き (自動リリース)
        run: |
          git tag -f latest
          git push -f origin latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: リリースを上書き更新
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Nebuntu Latest Build"
          body: "Pushされるたびに自動更新されるNebuntu ISOです。ビルド時刻: $(date)"
          files: nebuntu.iso
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
