name: Build Nebuntu ISO

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:24.04
      options: --privileged

    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: 必要ツールをインストール
        run: |
          apt-get update
          apt-get install -y live-build xorriso debootstrap squashfs-tools sudo

      - name: Nebuntu 構成作成
        run: |
          mkdir -p live-build-dir
          cd live-build-dir
          sudo lb config \
            --distribution noble \
            --archive-areas "main restricted universe multiverse" \
            --debian-installer false \
            --bootappend-live "boot=live components locales=ja_JP.UTF-8 keyboard-layouts=jp" \
            --binary-images iso-hybrid \
            --memtest none
          mkdir -p config/package-lists
          cat <<'EOF' > config/package-lists/desktop.list.chroot
          network-manager
          xserver-xorg-core
          xserver-xorg-video-all
          xserver-xorg-input-all
          xfce4
          xfce4-terminal
          firefox
          fonts-vlgothic
          EOF

      - name: Nebuntu ISO をビルド
        run: |
          cd live-build-dir
          sudo lb build

      - name: 成果物をアップロード
        uses: actions/upload-artifact@v4
        with:
          name: Nebuntu-ISO-Package
          path: live-build-dir/*.iso
