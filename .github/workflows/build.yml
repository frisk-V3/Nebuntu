      - name: Configure and Build
        run: |
          # 以前のゴミを消去
          sudo rm -rf lb && mkdir lb && cd lb
          
          # 1. 構成の初期化
          # --mirror系は末尾に /ubuntu/ を追加
          lb config \
            --distribution jammy \
            --archive-areas "main universe" \
            --mirror-bootstrap "http://archive.ubuntu.com" \
            --mirror-binary "http://archive.ubuntu.com" \
            --binary-images iso-hybrid \
            --architectures amd64 \
            --cache false

          # 2. Mozillaリポジトリと鍵の設定
          # 接続先を https://packages.mozilla.org に修正
          mkdir -p config/archives
          echo "deb [signed-by=/usr/share/keyrings/mozilla.gpg] https://packages.mozilla.org mozilla main" > config/archives/mozilla.list.chroot
          curl -fSsL https://packages.mozilla.org/repo-signing-key.gpg | gpg --dearmor | sudo tee config/archives/mozilla.key.chroot > /dev/null

          # 3. パッケージリストの作成
          mkdir -p config/package-lists
          echo "network-manager xserver-xorg-core xfce4 xfce4-terminal firefox fonts-vlgothic sudo" > config/package-lists/desktop.list.chroot

          # 4. ビルド実行
          sudo lb build
