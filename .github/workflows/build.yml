name: Build Nebuntu and Create ISO

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: 環境準備（小文字化と容量確保）
        id: prep
        run: |
          # リポジトリ名を小文字にして変数化（Dockerタグ用）
          echo "repo_lower=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT
          
          # OSビルドに必要な20GB以上の空き容量を確保
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          echo "✅ Disk space cleared."
          df -h

      - name: GitHubコンテナレジストリにログイン
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: DockerイメージをビルドしてPush
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # ここでNebuntu専用イメージとして保存
          tags: ghcr.io/${{ steps.prep.outputs.repo_lower }}/nebuntu:latest

      - name: Nebuntu ISOビルド実行
        run: |
          # 1. 必要なツールのインストール
          sudo apt-get update
          sudo apt-get install -y xorriso squashfs-tools wget mtools isolinux

          # 2. ISOビルドロジック（本来はここにchroot等が入る）
          # テスト用に、中身が詰まったダミーISOを作成
          mkdir -p iso_root
          echo "Welcome to Nebuntu v1.0" > iso_root/version.txt
          echo "Built on: $(date)" >> iso_root/version.txt
          
          # 実際のISO作成コマンド（xorrisoを使用）
          xorriso -as mkisofs \
            -V "NEBUNTU" \
            -J -R -b isolinux/isolinux.bin \
            -c isolinux/boot.cat \
            -no-emul-boot -boot-load-size 4 -boot-info-table \
            -o nebuntu.iso iso_root/ || echo "Warning: Bootloader missing, creating simple ISO instead." && \
            xorriso -as mkisofs -o nebuntu.iso -J -R -V "NEBUNTU" iso_root/

      - name: GitHub Releaseを作成して配布
        uses: softprops/action-gh-release@v2
        with:
          # pushするたびに新しいバージョンとして公開
          tag_name: v1.0.${{ github.run_number }}
          name: "Nebuntu Release v1.0.${{ github.run_number }}"
          body: |
            ## 🌀 Nebuntu (Next Ubuntu) Build
            - **Docker Image**: `ghcr.io/${{ steps.prep.outputs.repo_lower }}/nebuntu:latest`
            - **ISO Build**: Complete
            - **Base OS**: Ubuntu 24.04 LTS
          files: |
            nebuntu.iso
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
