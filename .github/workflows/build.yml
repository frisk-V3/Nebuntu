name: Build Nebuntu ISO

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:24.04
      options: --privileged

    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: 必要ツールをインストール
        run: |
          apt-get update
          apt-get install -y live-build xorriso debootstrap squashfs-tools curl gpg sudo

      - name: Nebuntu 構成作成
        run: |
          mkdir -p live-build-dir/config/package-lists
          mkdir -p live-build-dir/config/archives
          cd live-build-dir

          sudo lb config \
            --distribution noble \
            --archive-areas "main restricted universe multiverse" \
            --mirror-bootstrap http://archive.ubuntu.com/ubuntu/ \
            --mirror-binary http://archive.ubuntu.com/ubuntu/ \
            --security false \
            --debian-installer false \
            --bootappend-live "boot=live components locales=ja_JP.UTF-8 keyboard-layouts=jp" \
            --binary-images iso-hybrid \
            --memtest none

          # Firefox リポジトリ（trusted=yes + /apt）
          echo "deb [trusted=yes] https://packages.mozilla.org/apt mozilla main" | tee config/archives/mozilla.list.chroot > /dev/null
          echo "deb [trusted=yes] https://packages.mozilla.org/apt mozilla main" | tee config/archives/mozilla.list.binary > /dev/null

      - name: パッケージリスト作成（ゴミ行混入防止）
        run: |
          cd live-build-dir
          rm -f config/package-lists/desktop.list.chroot
          touch config/package-lists/desktop.list.chroot

          echo "network-manager" >> config/package-lists/desktop.list.chroot
          echo "xserver-xorg-core" >> config/package-lists/desktop.list.chroot
          echo "xserver-xorg-video-all" >> config/package-lists/desktop.list.chroot
          echo "xserver-xorg-input-all" >> config/package-lists/desktop.list.chroot
          echo "xfce4" >> config/package-lists/desktop.list.chroot
          echo "xfce4-terminal" >> config/package-lists/desktop.list.chroot
          echo "firefox" >> config/package-lists/desktop.list.chroot
          echo "fonts-vlgothic" >> config/package-lists/desktop.list.chroot

      - name: Nebuntu ISO をビルド
        run: |
          cd live-build-dir
          sudo lb build

      - name: 成果物をアップロード
        uses: actions/upload-artifact@v4
        with:
          name: Nebuntu-ISO
          path: live-build-dir/*.iso
