      - name: パッケージリスト作成（改行コードのクリーンアップ）
        run: |
          cd live-build-dir
          # 一旦消して作り直す
          rm -f config/package-lists/desktop.list.chroot
          
          # 1行ずつ丁寧に追加（最後に必ず改行を入れる）
          cat <<EOF > config/package-lists/desktop.list.chroot
network-manager
xserver-xorg-core
xserver-xorg-video-all
xserver-xorg-input-all
xfce4
xfce4-terminal
firefox
fonts-vlgothic
EOF
          # 変なゴミが混じらないように念のためおまじない
          sed -i 's/\r//' config/package-lists/desktop.list.chroot
