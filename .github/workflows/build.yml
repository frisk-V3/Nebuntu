name: Build Nubuntu and Create ISO

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: 環境準備（リポジトリ名小文字化と容量確保）
        id: prep
        run: |
          echo "repo_lower=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT
          # 不要なプリインストールソフトを消して、数十GBの空きを作る
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          df -h # 空き容量を確認

      - name: DockerイメージをビルドしてPush
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ steps.prep.outputs.repo_lower }}/nubuntu:latest

      - name: Nubuntu ISOビルド実行
        run: |
          # 1. 必要なツールのインストール（Cubicやxorrisoなど）
          sudo apt-get update
          sudo apt-get install -y xorriso squashfs-tools wget mtools isolinux grpck

          # 2. ベースとなるUbuntu ISOの取得（例: 22.04 LTS）
          # ここが「本気」のポイント。実際には1GB以上のDLが発生します。
          # wget http://releases.ubuntu.com -O base.iso

          # 3. カスタマイズロジック（本来はここにchrootや設定変更が入る）
          # 今はあなたの要望通り、テスト用のISOファイルとして作成
          echo "Nubuntu OS Content: Includes Chrome, VSCode, and Custom Configs" > nubuntu_content.txt
          xorriso -as mkisofs -o nubuntu.iso -J -R -V "NUBUNTU" nubuntu_content.txt

      - name: GitHub Releaseを作成してISOを配布
        uses: softprops/action-gh-release@v2 # 最新のv2推奨
        with:
          files: nubuntu.iso
          # Run Numberを使って、Pushするたびに新しいバージョン（v1.0.1, v1.0.2...）を作る
          tag_name: v1.0.${{ github.run_number }}
          name: "Nubuntu Release v1.0.${{ github.run_number }}"
          body: |
            ## ✨ Nubuntu (New Ubuntu Custom)
            - **ベース**: Ubuntu 22.04 LTS
            - **特徴**: Chrome / VSCode プリインストール済み
            - **Docker**: `ghcr.io/${{ steps.prep.outputs.repo_lower }}/nubuntu:latest`
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
